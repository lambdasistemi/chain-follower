<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Call Graph Explorer</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #1a1a2e;
      color: #e0e0e0;
      display: flex;
      flex-direction: column;
      height: 100vh;
    }
    #toolbar {
      display: flex;
      gap: 8px;
      padding: 8px 12px;
      background: #16213e;
      border-bottom: 1px solid #333;
      flex-shrink: 0;
    }
    #toolbar button {
      padding: 6px 14px;
      border: 1px solid #444;
      border-radius: 4px;
      background: #252542;
      color: #e0e0e0;
      cursor: pointer;
      font-size: 13px;
    }
    #toolbar button:hover {
      background: #333;
      border-color: #666;
    }
    #main {
      display: flex;
      flex: 1;
      overflow: hidden;
    }
    #cy {
      flex: 1;
      background: #0f1525;
    }
    #sidebar {
      width: 280px;
      padding: 16px;
      background: #16213e;
      border-left: 1px solid #333;
      overflow-y: auto;
      flex-shrink: 0;
    }
    #sidebar h3 {
      color: #4a90d9;
      margin-bottom: 8px;
      word-break: break-all;
    }
    #sidebar p {
      color: #9e9e9e;
      font-size: 13px;
      line-height: 1.6;
    }
    .kind-badge {
      display: inline-block;
      padding: 2px 8px;
      border-radius: 3px;
      font-size: 11px;
      font-weight: bold;
      margin-bottom: 8px;
    }
    .kind-module { background: #2c3e50; }
    .kind-type { background: #8e44ad; }
    .kind-function { background: #27ae60; }
    .kind-constructor { background: #e67e22; }
  </style>
</head>
<body>
  <div id="toolbar"></div>
  <div id="main">
    <div id="cy"></div>
    <div id="sidebar">
      <p>Loading graph...</p>
    </div>
  </div>

  <script src="https://unpkg.com/cytoscape@3.30.4/dist/cytoscape.min.js"></script>
  <script src="https://unpkg.com/elkjs@0.9.3/lib/elk.bundled.js"></script>
  <script src="https://unpkg.com/cytoscape-elk@2.2.0/cytoscape-elk.js"></script>
  <script src="https://unpkg.com/cytoscape-expand-collapse@4.1.0/cytoscape-expand-collapse.js"></script>
  <script>
    // Register extensions
    if (typeof cytoscapeElk !== 'undefined') {
      cytoscape.use(cytoscapeElk);
    }
    if (typeof expandCollapse !== 'undefined') {
      cytoscape.use(expandCollapse);
    }
  </script>
  <script src="index.js"></script>
</body>
</html>
